{
  "run_name": "expanded_full",
  "workspace": "runs/expanded_full",
  "data_root": "data/expanded",
  "normalization": {
    "enabled": true,
    "mode": "bbox_diagonal",
    "target": 1.0,
    "center": "bbox"
  },
  "categories": [
    {
      "name": "airplane",
      "mesh_root": "data/expanded/shapenet_airplane",
      "tetra": {"epsilon": 0.002, "edge_length": 0.1}
    },
    {
      "name": "chair",
      "mesh_root": "data/expanded/shapenet_chair",
      "tetra": {"epsilon": 0.004, "edge_length": 0.2}
    },
    {
      "name": "table",
      "mesh_root": "data/expanded/shapenet_table",
      "tetra": {"epsilon": 0.004, "edge_length": 0.2}
    }
  ],
  "stages": {
    "normalize": true,
    "tetra": true,
    "preseg": true,
    "merge": true,
    "refine": true,
    "mcts": true,
    "local_refine": false,
    "render": false
  },
  "tetra": {
    "manifold_timeout_sec": 180,
    "ftetwild_timeout_sec": 300
  },
  "refine": {
    "reward_backend": "manifold_stateful",
    "score_cache_size": 8192,
    "max_step": 2000,
    "render_initial": false,
    "render_partition": false,
    "summary_metrics": false
  },
  "mcts": {
    "reward_backend": "manifold_stateful",
    "score_cache_size": 8192,
    "mcts_iter": 3000,
    "render_initial": false,
    "render_partition": false,
    "summary_metrics": false
  }
}
