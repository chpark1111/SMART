{
  "run_name": "paper_like",
  "workspace": "runs/paper_like",
  "data_root": "data",
  "normalization": {
    "enabled": true,
    "mode": "bbox_diagonal",
    "target": 1.0,
    "center": "bbox"
  },
  "categories": [
    {
      "name": "airplane",
      "mesh_root": "data/shapenet_airplane",
      "limit": 50,
      "tetra": {"epsilon": 0.002, "edge_length": 0.1}
    },
    {
      "name": "chair",
      "mesh_root": "data/shapenet_chair",
      "limit": 50,
      "tetra": {"epsilon": 0.004, "edge_length": 0.2}
    },
    {
      "name": "table",
      "mesh_root": "data/shapenet_table",
      "limit": 50,
      "tetra": {"epsilon": 0.004, "edge_length": 0.2}
    }
  ],
  "merge": {
    "init_type": "coacd",
    "tilted": true,
    "merge_eps": 0.02,
    "fast_merge": true
  },
  "refine": {
    "bbox_init": "grd_merged",
    "action_unit": 0.01,
    "num_action_scale": 1,
    "max_step": 2000,
    "cover_penalty": 100,
    "score_cache_size": 4096
  },
  "mcts": {
    "bbox_init": "bbox_direct",
    "action_unit": 0.02,
    "max_step": 150,
    "cover_penalty": 100,
    "mcts_iter": 10000,
    "exp_w": 0.001,
    "grdexp": true,
    "pns": true,
    "skip_rate": 0.9,
    "score_cache_size": 4096,
    "render_initial": false,
    "render_partition": false,
    "summary_metrics": false
  },
  "render": {
    "backend": "blender",
    "input_stage": "mcts",
    "joint_mesh": false,
    "fallback": true,
    "transparent": true,
    "camera": {
      "airplane": {
        "ortho_scale": 1.12,
        "shift_x": 0.10,
        "shift_y": -0.38,
        "rotation": [-0.25, 0.58, -0.08]
      },
      "chair": {
        "ortho_scale": 1.20,
        "shift_x": 0.10,
        "shift_y": -0.28
      },
      "table": {
        "ortho_scale": 1.55,
        "shift_x": 0.02,
        "shift_y": -0.25
      }
    }
  }
}
